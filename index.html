<!doctype html>
<html>
  <head>
    <title>Car Game</title>
    <style>
      body {
        margin: 0;
        background: black;
      }
      canvas {
        display: block;
        margin: auto;
        background: #222;
      }
      button {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 10px 20px;
        font-size: 18px;
        display: none;
      }
    </style>
  </head>

  <body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <button id="restartBtn">Restart</button>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const restartBtn = document.getElementById("restartBtn");

      // 🎵 Sound
      const crashSound = new Audio();

      // 🖼️ Images (LOCAL)
      const playerImg = new Image();
      playerImg.src = "myCar.png";

      const enemyImages = ["car1.png", "car2.png", "car3.png", "car4.png"].map(
        (src) => {
          const img = new Image();
          img.src = src;
          return img;
        },
      );

      // Game State
      let player, enemies, score, roadOffset, speed, isGameOver;
      let spawnTimer, lastLevelUp;

      // INIT
      function init() {
        player = { x: 180, y: 500, width: 40, height: 80, speed: 6 };
        enemies = [];
        score = 0;
        roadOffset = 0;
        speed = 4;
        isGameOver = false;

        spawnTimer = 0;
        lastLevelUp = 0;

        restartBtn.style.display = "none";
      }

      // Controls
      const keys = {};
      window.addEventListener("keydown", (e) => (keys[e.key] = true));
      window.addEventListener("keyup", (e) => (keys[e.key] = false));

      // Spawn enemy
      function spawnEnemy() {
        const lanes = [70, 170, 270];

        enemies.push({
          x: lanes[Math.floor(Math.random() * 3)],
          y: -100,
          width: 40,
          height: 80,
          speed: speed,
          img: enemyImages[Math.floor(Math.random() * enemyImages.length)],
        });
      }

      // Collision
      function isColliding(a, b) {
        return (
          a.x < b.x + b.width &&
          a.x + a.width > b.x &&
          a.y < b.y + b.height &&
          a.y + a.height > b.y
        );
      }

      // UPDATE
      function update() {
        if (isGameOver) return;

        if (keys["ArrowLeft"]) player.x -= player.speed;
        if (keys["ArrowRight"]) player.x += player.speed;

        // Boundaries
        if (player.x < 50) player.x = 50;
        if (player.x + player.width > canvas.width - 50)
          player.x = canvas.width - 50 - player.width;

        // Road
        roadOffset += speed;
        if (roadOffset > 40) roadOffset = 0;

        // Spawn
        spawnTimer++;
        if (spawnTimer > 60) {
          spawnEnemy();
          spawnTimer = 0;
        }

        // Enemies
        for (let i = enemies.length - 1; i >= 0; i--) {
          let enemy = enemies[i];
          enemy.y += enemy.speed;

          if (isColliding(player, enemy)) {
            isGameOver = true;
            restartBtn.style.display = "block";
          }

          if (enemy.y > canvas.height) {
            enemies.splice(i, 1);
            score++;
          }
        }

        // Difficulty
        if (score - lastLevelUp >= 5) {
          speed += 0.5;
          lastLevelUp = score;
        }
      }

      // Draw Road
      function drawRoad() {
        ctx.fillStyle = "gray";
        ctx.fillRect(50, 0, canvas.width - 100, canvas.height);

        ctx.strokeStyle = "white";
        ctx.lineWidth = 5;

        for (let y = -40; y < canvas.height; y += 40) {
          ctx.beginPath();
          ctx.moveTo(canvas.width / 2, y + roadOffset);
          ctx.lineTo(canvas.width / 2, y + 20 + roadOffset);
          ctx.stroke();
        }
      }

      // DRAW
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawRoad();

        // ❗ Ensure images loaded
        if (!playerImg.complete) return;

        ctx.drawImage(
          playerImg,
          player.x,
          player.y,
          player.width,
          player.height,
        );

        enemies.forEach((enemy) => {
          if (enemy.img.complete) {
            ctx.drawImage(
              enemy.img,
              enemy.x,
              enemy.y,
              enemy.width,
              enemy.height,
            );
          }
        });

        // Score
        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.fillText("Score: " + score, 10, 30);

        if (isGameOver) {
          ctx.font = "40px Arial";
          ctx.fillText("GAME OVER", 70, 300);
        }
      }

      // LOOP
      function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
      }

      // Restart
      restartBtn.addEventListener("click", () => {
        init();
      });

      // ✅ Start AFTER player image loads
      playerImg.onload = () => {
        init();
        gameLoop();
      };
    </script>
  </body>
</html>
