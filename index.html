<!doctype html>
<html>
  <head>
    <title>Car Game</title>
    <style>
      body {
        margin: 0;
        background: black;
        font-family: Arial, sans-serif;
      }

      canvas {
        display: block;
        margin: auto;
        background: #111;
        border-radius: 10px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
      }

      button {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 28px;
        font-size: 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.2s;
      }

      #startBtn {
        top: 40%;
        background: #00c853;
        color: white;
        box-shadow: 0 4px 15px rgba(0, 200, 83, 0.4);
      }

      #startBtn:hover {
        transform: translateX(-50%) scale(1.05);
      }

      #restartBtn {
        top: 55%;
        display: none;
        background: #ff5252;
        color: white;
        box-shadow: 0 4px 15px rgba(255, 82, 82, 0.4);
      }
    </style>
  </head>

  <body>
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <button id="startBtn">Start Game</button>
    <button id="restartBtn">Restart</button>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");

      const startBtn = document.getElementById("startBtn");
      const restartBtn = document.getElementById("restartBtn");

      // Images
      const playerImg = new Image();
      playerImg.src = "myCar.png";

      const enemyImages = ["car1.png", "car2.png", "car3.png", "car4.png"].map(
        (src) => {
          const img = new Image();
          img.src = src;
          return img;
        },
      );

      // Game State
      let player, enemies, score, roadOffset, speed, isGameOver;
      let spawnTimer, lastLevelUp;
      let gameStarted = false;

      // INIT
      function init() {
        player = { x: 180, y: 500, width: 40, height: 80, speed: 6 };
        enemies = [];
        score = 0;
        roadOffset = 0;
        speed = 4;
        isGameOver = false;

        spawnTimer = 0;
        lastLevelUp = 0;

        restartBtn.style.display = "none";
      }

      // Controls
      const keys = {};
      window.addEventListener("keydown", (e) => (keys[e.key] = true));
      window.addEventListener("keyup", (e) => (keys[e.key] = false));

      // Spawn enemy
      function spawnEnemy() {
        const lanes = [70, 170, 270];

        enemies.push({
          x: lanes[Math.floor(Math.random() * 3)],
          y: -100,
          width: 40,
          height: 80,
          speed: speed,
          img: enemyImages[Math.floor(Math.random() * enemyImages.length)],
        });
      }

      // Collision
      function isColliding(a, b) {
        return (
          a.x < b.x + b.width &&
          a.x + a.width > b.x &&
          a.y < b.y + b.height &&
          a.y + a.height > b.y
        );
      }

      // UPDATE
      function update() {
        if (!gameStarted || isGameOver) return;

        if (keys["ArrowLeft"]) player.x -= player.speed;
        if (keys["ArrowRight"]) player.x += player.speed;

        // boundaries
        if (player.x < 50) player.x = 50;
        if (player.x + player.width > canvas.width - 50)
          player.x = canvas.width - 50 - player.width;

        // road animation
        roadOffset += speed;
        if (roadOffset > 40) roadOffset = 0;

        // spawn
        spawnTimer++;
        if (spawnTimer > 60) {
          spawnEnemy();
          spawnTimer = 0;
        }

        // enemies
        for (let i = enemies.length - 1; i >= 0; i--) {
          let enemy = enemies[i];
          enemy.y += enemy.speed;

          if (isColliding(player, enemy)) {
            isGameOver = true;
            restartBtn.style.display = "block";
          }

          if (enemy.y > canvas.height) {
            enemies.splice(i, 1);
            score++;
          }
        }

        // difficulty
        if (score - lastLevelUp >= 5) {
          speed += 0.5;
          lastLevelUp = score;
        }
      }

      // DRAW ROAD (✨ improved)
      function drawRoad() {
        // road
        ctx.fillStyle = "#444";
        ctx.fillRect(50, 0, canvas.width - 100, canvas.height);

        // side grass
        ctx.fillStyle = "#1b5e20";
        ctx.fillRect(0, 0, 50, canvas.height);
        ctx.fillRect(canvas.width - 50, 0, 50, canvas.height);

        // side borders
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(50, 0, 5, canvas.height);
        ctx.fillRect(canvas.width - 55, 0, 5, canvas.height);

        // dashed line
        ctx.strokeStyle = "white";
        ctx.lineWidth = 5;

        for (let y = -40; y < canvas.height; y += 40) {
          ctx.beginPath();
          ctx.moveTo(canvas.width / 2, y + roadOffset);
          ctx.lineTo(canvas.width / 2, y + 20 + roadOffset);
          ctx.stroke();
        }
      }

      // DRAW
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawRoad();

        if (!gameStarted || !player) return;
        if (!playerImg.complete) return;

        ctx.drawImage(
          playerImg,
          player.x,
          player.y,
          player.width,
          player.height,
        );

        enemies.forEach((enemy) => {
          if (enemy.img.complete) {
            ctx.drawImage(
              enemy.img,
              enemy.x,
              enemy.y,
              enemy.width,
              enemy.height,
            );
          }
        });

        // score
        ctx.fillStyle = "white";
        ctx.font = "20px Arial";
        ctx.fillText("Score: " + score, 10, 30);

        if (isGameOver) {
          ctx.font = "40px Arial";
          ctx.fillText("GAME OVER", 70, 300);
        }
      }

      // LOOP
      function gameLoop() {
        update();
        draw();
        requestAnimationFrame(gameLoop);
      }

      // Buttons
      startBtn.onclick = () => {
        init();
        gameStarted = true;
        startBtn.style.display = "none";
      };

      restartBtn.onclick = () => {
        init();
      };

      // Start loop (no auto start)
      gameLoop();
    </script>
  </body>
</html>
